name: CI/CD Pipeline

on:
  push:
    branches: [main] # Trigger on push to main
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required for Turborepo diffing

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Requirement: pnpm 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Requirement: Node 20
          cache: "pnpm" # Restores pnpm store cache

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }} # Key derived from git SHA
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile # Ensure lockfile integrity

      - name: Build Affected
        # This handles the initial push by falling back to a full build if no parent commit exists
        run: pnpm turbo build --filter='...[HEAD^1]' || pnpm turbo build

      - name: Test Affected
        run: pnpm turbo test --filter='...[HEAD^1]' || pnpm turbo test

      - name: Deploy Workers
        # Skip deploy step for pull requests; only deploy on push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm turbo deploy --filter='[HEAD^1]' --filter='./services/*' || pnpm turbo deploy --filter='./services/*'
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }} 
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
